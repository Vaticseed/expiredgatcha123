<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DODGE LIST // Player Watch Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0d10;
    --bg-panel:#12171c;
    --bg-panel-2:#161d23;
    --line:#232b31;
    --accent:#ff4655;
    --accent-dim:#7a2530;
    --cyan:#3edbd3;
    --text:#e8ecef;
    --text-muted:#6b7680;
    --text-dim:#3f484f;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-deep);
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size:32px 32px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 20px 80px;}

  /* ---- Header / HUD boot ---- */
  header{
    padding:36px 0 24px;
    border-bottom:1px solid var(--line);
    margin-bottom:28px;
    position:relative;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--cyan);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .eyebrow::before{
    content:'';
    width:7px;height:7px;
    background:var(--cyan);
    box-shadow:0 0 8px var(--cyan);
    border-radius:50%;
    animation:pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
  .site-logo{
    display:block;
    height:clamp(40px,6vw,64px);
    width:auto;
    margin:0 0 6px;
  }
  h1 span{color:var(--accent);}
  .sub{color:var(--text-muted);font-size:14px;max-width:560px;line-height:1.5;}
  .stat-row{
    display:flex;gap:28px;margin-top:20px;
    font-family:'JetBrains Mono',monospace;
  }
  .stat-num{font-size:22px;color:var(--text);font-weight:700;}
  .stat-label{font-size:10px;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;}

  /* ---- Admin discord callout ---- */
  .contact-card{
    margin-top:22px;
    background:linear-gradient(135deg, rgba(88,101,242,0.10), rgba(88,101,242,0.02));
    border:1px solid rgba(88,101,242,0.35);
    border-radius:var(--radius);
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
    position:relative;
    overflow:hidden;
  }
  .contact-card::before{
    content:'';
    position:absolute;
    top:0;left:0;
    width:3px;height:100%;
    background:#5865F2;
    box-shadow:0 0 12px #5865F2;
  }
  .contact-icon{
    width:38px;height:38px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(88,101,242,0.15);
    border:1px solid rgba(88,101,242,0.4);
    border-radius:50%;
  }
  .contact-icon svg{width:19px;height:19px;}
  .contact-text{flex:1;min-width:180px;}
  .contact-title{
    font-family:'Chakra Petch',sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--text);
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0 0 3px;
  }
  .contact-sub{
    font-size:12.5px;
    color:var(--text-muted);
    margin:0;
  }
  .admin-discord-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .discord-pill{
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:rgba(88,101,242,0.14);
    border:1px solid rgba(88,101,242,0.5);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-weight:500;
    font-size:13px;
    padding:8px 14px;
    border-radius:var(--radius);
    transition:background .15s, transform .1s;
  }
  .discord-pill:hover{background:rgba(88,101,242,0.26);transform:translateY(-1px);}
  .discord-pill::before{
    content:'';
    width:7px;height:7px;
    border-radius:50%;
    background:#5865F2;
    box-shadow:0 0 6px #5865F2;
  }

  /* ---- Disclaimer ---- */
  .notice{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-left:2px solid var(--cyan);
    padding:14px 16px;
    font-size:12.5px;
    color:var(--text-muted);
    line-height:1.6;
    margin-bottom:28px;
    border-radius:var(--radius);
  }
  .notice strong{color:var(--text);}

  /* ---- Search + Add bar ---- */
  .controls{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  .scan-box{
    flex:1;min-width:220px;
    position:relative;
    display:flex;align-items:center;
  }
  .scan-box::before{
    content:'';
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:8px;height:8px;
    border-left:2px solid var(--cyan);
    border-bottom:2px solid var(--cyan);
    opacity:0.6;
  }
  input, textarea, select{
    font-family:'JetBrains Mono',monospace;
    background:var(--bg-panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:13px 14px 13px 32px;
    font-size:14px;
    width:100%;
    border-radius:var(--radius);
    outline:none;
    transition:border-color .15s;
  }
  select{padding-left:14px;cursor:pointer;}
  textarea{font-family:'Inter',sans-serif;padding-left:14px;resize:vertical;min-height:64px;}
  input:focus, textarea:focus{border-color:var(--cyan);}
  input::placeholder, textarea::placeholder{color:var(--text-dim);}

  button{
    font-family:'Chakra Petch',sans-serif;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:13px;
    border:none;
    cursor:pointer;
    border-radius:var(--radius);
    transition:transform .1s, background .15s, opacity .15s;
  }
  button:active{transform:scale(0.97);}
  .btn-primary{
    background:var(--accent);
    color:#150507;
    padding:13px 22px;
    white-space:nowrap;
  }
  .btn-primary:hover{background:#ff5c68;}
  .btn-ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-muted);
    padding:13px 18px;
  }
  .btn-ghost:hover{border-color:var(--text-muted);color:var(--text);}

  /* ---- Add form (collapsible) ---- */
  .add-panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:28px;
    display:none;
  }
  .add-panel.open{display:block;}
  .add-panel h3{
    font-family:'Chakra Petch',sans-serif;
    font-size:14px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--accent);margin:0 0 14px;
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .grid2 input:last-child{}
  .field-label{font-size:10px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;display:block;}
  .form-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end;}

  /* ---- List ---- */
  #empty-state{
    text-align:center;padding:60px 20px;color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;font-size:13px;
  }
  .entry{
    position:relative;
    background:var(--bg-panel);
    border:1px solid var(--line);
    padding:18px 20px;
    margin-bottom:10px;
    border-radius:var(--radius);
  }
  .entry::before, .entry::after{
    content:'';position:absolute;width:10px;height:10px;
    border-color:var(--accent-dim);opacity:0.9;
  }
  .entry::before{top:-1px;left:-1px;border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
  .entry::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);}
  .entry-top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .entry-top-right{display:flex;align-items:center;gap:10px;}
  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:17px;font-weight:700;
    color:var(--text);
    direction:ltr;
    unicode-bidi:isolate;
    text-decoration:none;
    display:inline-block;
    transition:color .15s;
  }
  .tag:hover{color:var(--cyan);text-decoration:underline;}
  .tag .hash{color:var(--accent);}
  .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;letter-spacing:0.1em;
    padding:3px 7px;border-radius:2px;
    text-transform:uppercase;
    border:1px solid var(--text-dim);
    color:var(--text-dim);
  }
  .badge.verified-badge{color:#4ade80;border-color:#4ade80;}
  .reason{color:var(--text-muted);font-size:13.5px;margin-top:8px;line-height:1.5;}
  .meta-row{
    display:flex;justify-content:flex-end;align-items:center;
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);
  }
  .meta-actions{display:flex;gap:14px;align-items:center;}
  .meta-actions span{cursor:pointer;transition:color .15s;}
  .meta-actions span:hover{color:var(--accent);}
  .rank-tag{
    display:inline-flex;align-items:center;gap:5px;
    color:var(--text);
    cursor:default !important;
  }
  .rank-tag:hover{color:var(--text) !important;}
  .rank-tag img{width:16px;height:16px;}

  /* ---- Big rank icon, top-right of card ---- */
  .rank-icon-large{
    width:38px;height:38px;
    filter:drop-shadow(0 0 8px rgba(255,255,255,0.15));
    flex-shrink:0;
  }

  footer{margin-top:50px;text-align:center;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
  footer a{color:var(--cyan);text-decoration:none;}

  /* ---- Admin corner (top-left) ---- */
  .admin-corner{
    position:fixed;
    top:16px;left:16px;
    z-index:100;
    font-family:'JetBrains Mono',monospace;
  }
  .admin-btn{
    background:var(--bg-panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:8px 12px;
    border-radius:var(--radius);
    cursor:pointer;
    display:flex;align-items:center;gap:6px;
    transition:border-color .15s, color .15s;
  }
  .admin-btn:hover{border-color:var(--text-muted);color:var(--text);}
  .admin-btn.is-admin{border-color:var(--cyan);color:var(--cyan);}
  .admin-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);}
  .admin-btn.is-admin .dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}
  .admin-dropdown{
    display:none;
    position:absolute;
    top:calc(100% + 8px);left:0;
    width:260px;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .admin-dropdown.open{display:block;}
  .admin-dropdown h3{
    font-family:'Chakra Petch',sans-serif;
    font-size:12px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--accent);margin:0 0 12px;
  }
  .admin-dropdown input{font-size:13px;padding:10px 12px;}
  .admin-dropdown .field-label{margin-top:0;}
  .admin-dropdown .form-actions{margin-top:12px;}
  .admin-dropdown .sub{font-size:12px;margin:0 0 10px;}

  @media(max-width:520px){
    .grid2{grid-template-columns:1fr;}
    .controls{flex-direction:column;}
  }
</style>
</head>
<body>

<div class="admin-corner">
  <button class="admin-btn" id="admin-toggle-btn"><span class="dot"></span><span id="admin-btn-label">Admin</span></button>
  <div class="admin-dropdown" id="admin-dropdown">
    <div id="admin-login-fields">
      <h3>// Admin login</h3>
      <label class="field-label">Email</label>
      <input id="admin-email" type="email" placeholder="you@example.com" autocomplete="username">
      <div style="height:10px;"></div>
      <label class="field-label">Password</label>
      <input id="admin-password" type="password" placeholder="••••••••" autocomplete="current-password">
      <div class="form-actions">
        <button class="btn-ghost" id="admin-cancel">Cancel</button>
        <button class="btn-primary" id="admin-login-btn">Log in</button>
      </div>
    </div>
    <div id="admin-logged-in" style="display:none;">
      <h3>// Admin</h3>
      <p class="sub">You're logged in. You can add entries and delete any entry.</p>
      <div class="form-actions">
        <button class="btn-ghost" id="admin-logout-btn">Log out</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">

  <header>
    <img src="logo.png" alt="MENA Dodge List" class="site-logo">
    <div class="contact-card">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4h16v13l-4-3H4V4z" stroke="#5865F2" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="contact-text">
        <p class="contact-title">Want someone added or removed?</p>
        <p class="contact-sub">Message an admin on Discord and they'll review the request.</p>
      </div>
      <div class="admin-discord-row" id="admin-discord-row"></div>
    </div>
    <div class="stat-row">
      <div><div class="stat-num" id="stat-total">0</div><div class="stat-label">Entries</div></div>
    </div>
  </header>



  <div class="controls">
    <div class="scan-box"><input id="search" type="text" placeholder="Search by Username#Tag..." autocomplete="off"></div>
    <button class="btn-primary" id="toggle-add" style="display:none;">+ Add Entry</button>
  </div>

  <div class="add-panel" id="add-panel">
    <h3>// File a report</h3>
    <div class="grid2">
      <div>
        <label class="field-label">Username</label>
        <input id="in-username" type="text" placeholder="PlayerName" dir="auto">
      </div>
      <div>
        <label class="field-label">Tag</label>
        <input id="in-tag" type="text" placeholder="1337" dir="auto">
      </div>
    </div>
    <label class="field-label">Reason (optional)</label>
    <textarea id="in-reason" placeholder="What happened? Be specific, this is what other players will see."></textarea>
    <div class="form-actions">
      <button class="btn-ghost" id="cancel-add">Cancel</button>
      <button class="btn-primary" id="submit-add">Submit Report</button>
    </div>
  </div>

  <div id="list"></div>
  <div id="empty-state" style="display:none;">NO ENTRIES FOUND</div>


</div>

<script type="module">
/* ============================================================
   BACKEND
   By default this runs on localStorage. Data only lives in
   YOUR browser, so it won't actually be shared with other
   visitors of your GitHub Pages site. To make it a real shared
   list, set up a free Firebase project and paste your config
   below. See README.md for step-by-step instructions.
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDAePq-7gWwAuQ9XI--B3v8GkEHFDi5vPk",
  authDomain: "dodge-list.firebaseapp.com",
  projectId: "dodge-list",
  storageBucket: "dodge-list.firebasestorage.app",
  messagingSenderId: "6281986139",
  appId: "1:6281986139:web:13b3d2c48a06a9acd53f7e"
};

/* ============================================================
   VALORANT RANK LOOKUP (optional)
   Unofficial third-party API (HenrikDev), not affiliated with
   Riot Games. Get a free "Basic" key at api.henrikdev.xyz/dashboard
   (requires joining their Discord). Paste it below. Leave as
   null to hide the "Check Rank" feature entirely.
   ============================================================ */
const HENRIK_API_KEY = "HDEV-3e1b5dcb-80ca-402c-8202-dec975c2dc5f";

let useFirebase = false;
let db, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query, orderBy;
let auth, signInWithEmailAndPassword, signOut, onAuthStateChanged;
let isAdmin = false;

if (FIREBASE_CONFIG) {
  try {
    const app = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const fs = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const authLib = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
    const firebaseApp = app.initializeApp(FIREBASE_CONFIG);
    db = fs.getFirestore(firebaseApp);
    collection = fs.collection; addDoc = fs.addDoc; onSnapshot = fs.onSnapshot;
    updateDoc = fs.updateDoc; deleteDoc = fs.deleteDoc; doc = fs.doc; query = fs.query; orderBy = fs.orderBy;
    auth = authLib.getAuth(firebaseApp);
    signInWithEmailAndPassword = authLib.signInWithEmailAndPassword;
    signOut = authLib.signOut;
    onAuthStateChanged = authLib.onAuthStateChanged;
    useFirebase = true;
    onAuthStateChanged(auth, (user) => {
      isAdmin = !!user;
      document.getElementById('admin-login-fields').style.display = isAdmin ? 'none' : 'block';
      document.getElementById('admin-logged-in').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('admin-btn-label').textContent = isAdmin ? 'Admin ✓' : 'Admin';
      document.getElementById('admin-toggle-btn').classList.toggle('is-admin', isAdmin);
      document.getElementById('toggle-add').style.display = isAdmin ? 'inline-flex' : 'none';
      if (!isAdmin) document.getElementById('add-panel').classList.remove('open');
      render();
    });
  } catch (e) {
    console.error('Firebase failed to load, falling back to localStorage', e);
  }
}

const LOCAL_KEY = 'dodge-list-entries';
function loadLocal(){ try{ return JSON.parse(localStorage.getItem(LOCAL_KEY)) || []; }catch{ return []; } }
function saveLocal(entries){ localStorage.setItem(LOCAL_KEY, JSON.stringify(entries)); }

/* ============================================================
   ADMIN DISCORD USERNAMES
   Edit this list to add/remove who shows up as an admin to
   contact. Just add or remove names in the array below.
   ============================================================ */
const ADMIN_DISCORDS = ['lovewnl', 'benjyvv'];

const adminDiscordRow = document.getElementById('admin-discord-row');
adminDiscordRow.innerHTML = ADMIN_DISCORDS.map(name => `<span class="discord-pill">${escapeHtml(name)}</span>`).join('');

let entries = [];

function render(){
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('empty-state');
  const q = document.getElementById('search').value.trim().toLowerCase();

  const filtered = entries
    .slice()
    .sort((a,b)=> {
      const tierA = typeof a.rankTier === 'number' ? a.rankTier : -1;
      const tierB = typeof b.rankTier === 'number' ? b.rankTier : -1;
      if (tierA !== tierB) return tierB - tierA;
      return (b.createdAt||0) - (a.createdAt||0);
    })
    .filter(e => {
      if (!q) return true;
      const full = `${e.username}#${e.tag}`.toLowerCase();
      return full.includes(q) || e.username.toLowerCase().includes(q);
    });

  document.getElementById('stat-total').textContent = entries.length;

  listEl.innerHTML = '';
  emptyEl.style.display = filtered.length ? 'none' : 'block';

  filtered.forEach(e => {
    const card = document.createElement('div');
    card.className = 'entry';
    const badge = e.verified
      ? '<span class="badge verified-badge">Verified</span>'
      : '';

    let rankIconHtml = '';
    let rankAction = '';
    if (HENRIK_API_KEY) {
      if (rankLoadingIds.has(e.id)) {
        rankAction = `<span class="rank-tag">Checking...</span>`;
      } else if (e.rank) {
        if (e.rankImage) rankIconHtml = `<img class="rank-icon-large" src="${e.rankImage}" alt="${escapeHtml(e.rank)}" title="${escapeHtml(e.rank)}">`;
        if (isAdmin) rankAction = `<span data-action="check-rank" data-id="${e.id}" style="color:var(--text-dim);">Refresh</span>`;
      } else if (isAdmin) {
        rankAction = `<span data-action="check-rank" data-id="${e.id}" style="color:var(--cyan);">Check Rank</span>`;
      }
    }

    const trackerUrl = `https://tracker.gg/valorant/profile/riot/${encodeURIComponent(`${e.username}#${e.tag}`)}/overview`;

    card.innerHTML = `
      <div class="entry-top">
        <a class="tag" href="${trackerUrl}" target="_blank" rel="noopener noreferrer"><bdi>${escapeHtml(e.username)}</bdi><span class="hash">#</span><bdi>${escapeHtml(e.tag)}</bdi></a>
        <div class="entry-top-right">
          ${badge}
          ${rankIconHtml}
        </div>
      </div>
      ${e.reason ? `<div class="reason">${escapeHtml(e.reason)}</div>` : ''}
      <div class="meta-row">
        <span class="meta-actions">
          ${rankAction}
          ${isAdmin ? `<span data-action="delete" data-id="${e.id}" style="color:var(--accent);">Delete</span>` : ''}
        </span>
      </div>
    `;
    listEl.appendChild(card);
  });

  listEl.querySelectorAll('[data-action="delete"]').forEach(el=>{
    el.addEventListener('click', ()=> deleteEntry(el.getAttribute('data-id')));
  });
  listEl.querySelectorAll('[data-action="check-rank"]').forEach(el=>{
    el.addEventListener('click', ()=> checkRank(el.getAttribute('data-id')));
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

async function addEntry(entry){
  entry.createdAt = Date.now();
  entry.verified = true;
  if (useFirebase) {
    const ref = await addDoc(collection(db, 'entries'), entry);
    return ref.id;
  } else {
    entry.id = 'e' + Math.random().toString(36).slice(2,10);
    entries.push(entry);
    saveLocal(entries);
    render();
    return entry.id;
  }
}

async function deleteEntry(id){
  if (!confirm('Delete this entry permanently?')) return;
  if (useFirebase) {
    await deleteDoc(doc(db, 'entries', id));
  } else {
    entries = entries.filter(e => e.id !== id);
    saveLocal(entries);
    render();
  }
}

const rankLoadingIds = new Set();

async function checkRankFor(id, username, tag){
  if (!isAdmin) return;
  if (!HENRIK_API_KEY) return;
  rankLoadingIds.add(id);
  render();
  try {
    const region = 'eu';
    const url = `https://api.henrikdev.xyz/valorant/v2/mmr/${region}/${encodeURIComponent(username)}/${encodeURIComponent(tag)}`;
    const res = await fetch(url, { headers: { Authorization: HENRIK_API_KEY } });
    const json = await res.json();
    if (!res.ok || !json.data) throw new Error(json?.errors?.[0]?.message || 'Rank not found');
    const current = json.data.current_data || {};
    const rank = current.currenttier_patched || 'Unrated';
    const rankImage = current.images?.small || null;
    const rankTier = typeof current.currenttier === 'number' ? current.currenttier : 0;
    const update = { rank, rankImage, rankTier, rankCheckedAt: Date.now() };
    // HenrikDev returns the account's real name/tag with correct in-game
    // capitalization, use it to fix whatever casing was typed in.
    if (json.data.name) update.username = json.data.name;
    if (json.data.tag) update.tag = json.data.tag;
    if (useFirebase) {
      await updateDoc(doc(db, 'entries', id), update);
    } else {
      const target = entries.find(e => e.id === id);
      if (target) Object.assign(target, update);
      saveLocal(entries);
    }
  } catch (e) {
    console.warn('Could not fetch rank for', username, tag, ':', e.message);
    throw e;
  } finally {
    rankLoadingIds.delete(id);
    render();
  }
}

async function checkRank(id){
  if (!isAdmin) return;
  if (!HENRIK_API_KEY) { alert('Rank lookup is not set up yet, see README.md.'); return; }
  const target = entries.find(e => e.id === id);
  if (!target) return;
  try {
    await checkRankFor(id, target.username, target.tag);
  } catch (e) {
    alert('Could not fetch rank: ' + e.message);
  }
}

if (useFirebase) {
  const q = query(collection(db,'entries'), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
} else {
  entries = loadLocal();
  render();
}

/* ---- UI wiring ---- */
document.getElementById('search').addEventListener('input', render);

document.getElementById('in-username').addEventListener('paste', (ev)=>{
  const pasted = (ev.clipboardData || window.clipboardData).getData('text');
  if (pasted && pasted.includes('#')) {
    ev.preventDefault();
    const [name, ...rest] = pasted.split('#');
    document.getElementById('in-username').value = name.trim();
    document.getElementById('in-tag').value = rest.join('#').trim();
    document.getElementById('in-tag').focus();
  }
});

const addPanel = document.getElementById('add-panel');
document.getElementById('toggle-add').addEventListener('click', ()=>{
  addPanel.classList.toggle('open');
});
document.getElementById('cancel-add').addEventListener('click', ()=>{
  addPanel.classList.remove('open');
});

document.getElementById('submit-add').addEventListener('click', async ()=>{
  const username = document.getElementById('in-username').value.trim();
  const tag = document.getElementById('in-tag').value.trim().replace(/^#/,'');
  const reason = document.getElementById('in-reason').value.trim();

  if (!username || !tag) { alert('Username and tag are required.'); return; }

  const newId = await addEntry({ username, tag, reason });
  if (HENRIK_API_KEY && newId) {
    checkRankFor(newId, username, tag).catch(e => {
      console.warn('Auto rank check failed for new entry:', e.message);
    });
  }

  document.getElementById('in-username').value = '';
  document.getElementById('in-tag').value = '';
  document.getElementById('in-reason').value = '';
  addPanel.classList.remove('open');
});


const adminDropdown = document.getElementById('admin-dropdown');
document.getElementById('admin-toggle-btn').addEventListener('click', ()=>{
  if (!useFirebase) { alert('Admin login requires Firebase to be set up first. See README.md.'); return; }
  adminDropdown.classList.toggle('open');
});
document.getElementById('admin-cancel').addEventListener('click', ()=>{
  adminDropdown.classList.remove('open');
});
document.getElementById('admin-login-btn').addEventListener('click', async ()=>{
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  if (!email || !password) { alert('Enter email and password.'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, password);
    document.getElementById('admin-password').value = '';
    adminDropdown.classList.remove('open');
  } catch (e) {
    alert('Login failed: ' + e.message);
  }
});
document.getElementById('admin-logout-btn').addEventListener('click', async ()=>{
  await signOut(auth);
  adminDropdown.classList.remove('open');
});

document.addEventListener('click', (ev)=>{
  const corner = document.querySelector('.admin-corner');
  if (!corner.contains(ev.target)) adminDropdown.classList.remove('open');
});
</script>
